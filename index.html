<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmasi Registration</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6e4e8 0%, #f3dfe3 100%);
      padding: 30px 15px 120px;
    }

    .wrapper {
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 26px;
      padding: 28px 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      animation: fadeInCard 0.7s ease;
    }

    @keyframes fadeInCard {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 18px;
      perspective: 1200px;
    }

    .logo-img {
      width: 200px;
      max-width: 100%;
      display: inline-block;
      animation: rotate3D 4s linear infinite;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    @keyframes rotate3D {
      0% {
        transform: rotateY(0deg);
      }
      100% {
        transform: rotateY(-360deg);
      }
    }

    .title {
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 18px;
      color: #212121;
    }

    .info-box {
      border: 1.5px solid #ff6b7a;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 18px;
      background: #fffafa;
    }

    .info-title {
      color: #ff5b6e;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .info-row {
      margin-bottom: 6px;
      font-size: 15px;
      color: #222;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 14px;
      border: 1px solid #ddd;
      font-size: 15px;
      background: #fff;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #ff6b7a;
      outline: none;
      box-shadow: 0 0 0 4px rgba(255, 107, 122, 0.12);
    }

    .main-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(180deg, #ff6b7a, #ff4d5f);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .main-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .main-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .msg {
      display: none;
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      line-height: 1.4;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    .music-box {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: white;
      padding: 10px 12px;
      border-radius: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      z-index: 999;
    }

    .music-btn {
      border: none;
      background: linear-gradient(180deg, #ff6b7a, #ff4d5f);
      color: white;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
      width: auto;
    }

    #volume {
      width: 85px;
      cursor: pointer;
      accent-color: #ff5b6e;
    }

    @media (max-width: 480px) {
      .wrapper {
        padding: 24px 18px;
      }

      .logo-img {
        width: 180px;
      }

      .title {
        font-size: 18px;
      }

      .music-box {
        right: 12px;
        bottom: 12px;
      }

      #volume {
        width: 72px;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="logo">
      <img src="farmasi.png" class="logo-img" alt="Farmasi Logo">
    </div>

    <div class="title">ტრენინგზე რეგისტრაცია</div>

    <div class="info-box">
      <div class="info-title">📍 ტრენინგის დეტალები</div>
      <div class="info-row">📌 ქალაქი: თბილისი</div>
      <div class="info-row">📅 თარიღი: 28 მარტი</div>
      <div class="info-row">🕒 დრო: 12:00</div>
      <div class="info-row">🏢 ლოკაცია: Farmasi ოფისი</div>
    </div>

    <form id="form">
      <input type="text" name="first_name" placeholder="სახელი" required>
      <input type="text" name="last_name" placeholder="გვარი" required>
      <input type="tel" name="phone" placeholder="ტელეფონი (599123456)" required>
      <button id="btn" class="main-btn" type="submit">დარეგისტრირება</button>
    </form>

    <div id="success" class="msg success">წარმატებით დარეგისტრირდა ✅</div>
    <div id="error" class="msg error">შეცდომა ❌ სცადე თავიდან</div>
  </div>

  <audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="music-box">
    <button id="playBtn" class="music-btn" type="button">🎵</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxDQvpO2WeWvneJvemZeXV3LnMrElNw1-FbIPvj0ZiBF46VOmCF4omeukQOviaZ3rw/exec";

    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const success = document.getElementById("success");
    const error = document.getElementById("error");

    const music = document.getElementById("music");
    const playBtn = document.getElementById("playBtn");
    const volume = document.getElementById("volume");

    let playing = false;
    music.volume = 0.3;

    playBtn.addEventListener("click", async () => {
      try {
        if (!playing) {
          await music.play();
          playing = true;
          playBtn.textContent = "🔇";
        } else {
          music.pause();
          playing = false;
          playBtn.textContent = "🎵";
        }
      } catch (e) {
        alert("მუსიკა ვერ ჩაირთო. გადაამოწმე music.mp3 ფაილი.");
      }
    });

    volume.addEventListener("input", () => {
      music.volume = parseFloat(volume.value);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      success.style.display = "none";
      error.style.display = "none";

      btn.disabled = true;
      btn.textContent = "იგზავნება...";

      try {
        const res = await fetch(scriptURL, {
          method: "POST",
          body: new FormData(form)
        });

        const text = (await res.text()).trim();

        if (text === "success") {
          form.reset();
          success.style.display = "block";
        } else if (text === "duplicate") {
          error.textContent = "ეს ნომერი უკვე დარეგისტრირებულია ❌";
          error.style.display = "block";
        } else if (text === "invalid") {
          error.textContent = "ტელეფონის ნომერი არასწორია ❌";
          error.style.display = "block";
        } else if (text === "full") {
          error.textContent = "ადგილები სრულად შევსებულია ❌";
          error.style.display = "block";
        } else if (text === "closed") {
          error.textContent = "რეგისტრაცია დახურულია ❌";
          error.style.display = "block";
        } else {
          error.textContent = "შეცდომა ❌ სცადე თავიდან";
          error.style.display = "block";
        }
      } catch (e) {
        error.textContent = "შეცდომა ❌ სცადე თავიდან";
        error.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "დარეგისტრირება";
    });
  </script>

</body>
</html>
