<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ოქროს ლოდის ცვენა — Farmasi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(180deg, #2a0c14 0%, #1a050a 50%, #0d0306 100%);
  min-height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
}
.stage {
  position: fixed;
  inset: 0;
  overflow: hidden;
}
.title {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  text-align: center;
  color: #f4d27a;
  pointer-events: none;
}
.title h1 { font-size: 28px; font-weight: 400; letter-spacing: 3px; margin-bottom: 6px; }
.title p { font-size: 11px; color: #c9a956; letter-spacing: 4px; opacity: 0.7; text-transform: uppercase; }

.btn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  padding: 16px 32px;
  background: rgba(232, 196, 104, 0.15);
  border: 2px solid #c9a956;
  border-radius: 12px;
  color: #f4d27a;
  font-family: Georgia, serif;
  font-size: 15px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,240,180,0.25);
}
.btn:hover {
  background: rgba(232, 196, 104, 0.28);
  transform: translateX(-50%) translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 40px rgba(232, 196, 104, 0.4);
}
.btn:active { transform: translateX(-50%) translateY(2px); }

@keyframes fallNat {
  0% { transform: translateY(-200px) rotate(var(--sr)) scale(0.8); opacity: 0; }
  6% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(var(--er)) scale(1); opacity: 0.95; }
}
@keyframes shineWobble {
  0%, 100% { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.7)) drop-shadow(0 0 22px rgba(232,196,104,0.4)) brightness(1); }
  50% { filter: drop-shadow(0 14px 30px rgba(0,0,0,0.8)) drop-shadow(0 0 35px rgba(255,245,214,0.6)) brightness(1.15); }
}
.bar {
  position: absolute;
  top: 0;
  pointer-events: none;
  animation: fallNat var(--dur) cubic-bezier(0.55, 0.05, 0.6, 0.5) forwards;
  will-change: transform, opacity;
}
.bar img {
  width: 100%;
  height: auto;
  display: block;
  animation: shineWobble 1.4s ease-in-out infinite;
}
</style>
</head>

  <p>FARMASI · NATURAL GRAVITY</p>
</div>

const stage = document.getElementById('stage');

function spawn(delay) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  const w = 70 + Math.random() * 80;
  const left = Math.random() * 92;
  const dur = 2.5 + Math.random() * 2.0;
  const sr = (Math.random() - 0.5) * 30;
  const er = sr + (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 360);
  bar.style.cssText = `left:${left}vw; width:${w}px; --dur:${dur}s; --sr:${sr}deg; --er:${er}deg; animation-delay:${delay}s;`;
  const img = document.createElement('img');
  img.src = SRC;
  bar.appendChild(img);
  stage.appendChild(bar);
  setTimeout(() => bar.remove(), (dur + delay + 0.5) * 1000);
}

function storm() {
  stage.querySelectorAll('.bar').forEach(b => b.remove());
  const N = 90;
  for (let i = 0; i < N; i++) {
    spawn((i / N) * 1.8 + Math.random() * 0.4);
  }
}

document.getElementById('restart').addEventListener('click', storm);
window.addEventListener('load', storm);
setInterval(storm, 6500);
</script>
